<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan Penjualan</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:20px;
}

.container{
    width:95%;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table th,
table td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

table th{
    background:#2196F3;
    color:white;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:white;
    background:#2196F3;
}

button:hover{
    background:#1976D2;
}

.back{
    background:#555;
}

.back:hover{
    background:#333;
}

.hapus{
    background:#e53935;
}

.hapus:hover{
    background:#c62828;
}

.detail{
    text-align:left;
    font-size:14px;
}

</style>

</head>
<body>

<div class="container">

<a href="dashboard.html">
<button class="back">Kembali ke Dashboard</button>
</a>

<h2>Laporan Penjualan</h2>

<table>

<thead>

<tr>
<th>No</th>
<th>Tanggal</th>
<th>Detail Barang</th>
<th>Total Barang</th>
<th>Total Bayar</th>
</tr>

</thead>

<tbody id="tabelLaporan">

</tbody>

</table>

<br>

<button class="hapus" onclick="hapusLaporan()">
Hapus Semua Laporan
</button>

</div>

<script src="laporan.js"></script>

</body>
</html>
