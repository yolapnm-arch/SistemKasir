<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Barang</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:20px;
}

.container{
    width:90%;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
    text-align:center;
}

label{
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    padding:10px 15px;
    margin:5px 2px;
    border:none;
    border-radius:5px;
    background:#2196F3;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1976D2;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table th,table td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

table th{
    background:#2196F3;
    color:white;
}

.back{
    background:#555;
}

.back:hover{
    background:#333;
}
</style>

</head>
<body>

<div class="container">

<a href="dashboard.html">
<button class="back">Kembali ke Dashboard</button>
</a>

<h2>Data Barang</h2>

<input type="hidden" id="index">

<label>Nama Barang</label>
<input type="text" id="nama">

<label>Harga Barang</label>
<input type="number" id="harga">

<label>Stok Barang</label>
<input type="number" id="stok">

<button onclick="simpan()">Simpan</button>
<button onclick="batal()">Batal</button>

<br><br>

<label>Cari Barang</label>
<input type="text" id="cari" placeholder="Masukkan nama barang..." onkeyup="tampil()">

<table>
<thead>
<tr>
<th>No</th>
<th>Nama Barang</th>
<th>Harga</th>
<th>Stok</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tabel"></tbody>

</table>

</div>

<script src="databarang.js"></script>

</body>
</html>
