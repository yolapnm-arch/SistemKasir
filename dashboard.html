<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Kasir</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
}

.header{
    background:#007bff;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    display:flex;
}

.sidebar{
    width:220px;
    background:#343a40;
    min-height:100vh;
    padding-top:20px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px;
}

.sidebar a:hover{
    background:#007bff;
}

.content{
    flex:1;
    padding:20px;
}

.card-container{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    width:220px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
    text-align:center;
}

.card h3{
    margin-bottom:10px;
}

.card p{
    margin-bottom:15px;
}

button{
    background:#007bff;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}
</style>

</head>
<body>

<div class="header">
    <h1>Dashboard Kasir</h1>
    <p>Selamat Datang, Admin</p>
</div>

<div class="container">

<div class="sidebar">
    <a href="#">🏠 Dashboard</a>
    <a href="databarang.html">📦 Data Barang</a>
    <a href="transaksi.html">🛒 Transaksi</a>
    <a href="laporan.html">📊 Laporan</a>
    <a href="#" onclick="logout()">🚪 Logout</a>
</div>

<div class="content">

<h2>Menu Utama</h2>
<br>

<div class="card-container">

<div class="card">
<h3>📦 Data Barang</h3>
<p>Kelola data barang.</p>
<button onclick="window.location.href='kasir.html'">Buka</button>
</div>

<div class="card">
<h3>🛒 Transaksi</h3>
<p>Melayani transaksi penjualan.</p>
<button onclick="window.location.href='transaksi.html'">Buka</button>
</div>

<div class="card">
<h3>📊 Laporan</h3>
<p>Lihat laporan penjualan.</p>
<button onclick="window.location.href='laporan.html'">Buka</button>
</div>

</div>

</div>

</div>

<script>
function logout(){
    if(confirm("Yakin ingin logout?")){
        window.location.href="login.html";
    }
}
</script>

</body>
</html>
