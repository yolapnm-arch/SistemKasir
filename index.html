"<!DOCTYPE html>
<html lang=\"id\">
<head>
  <meta charset=\"UTF-8\" />
  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />
  <title>Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background-color: #808080;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      position: relative;
      background-color: #ffffff;
      width: 100%;
      max-width: 420px;
      border-radius: 10px;
      padding: 50px 45px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
    }

    /* Tombol X di pojok kanan atas */
    .close-btn {
      position: absolute;
      top: -18px;
      right: 30px;
      width: 40px;
      height: 50px;
      background-color: #ffffff;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
      color: #5b2a86;
      font-size: 20px;
      font-weight: bold;
      font-family: 'Times New Roman', serif;
    }

    .close-btn:hover {
      background-color: #f5f5f5;
    }

    h1.title {
      text-align: center;
      font-size: 42px;
      font-weight: bold;
      color: #000000;
      margin-bottom: 50px;
    }

    .form-group {
      margin-bottom: 35px;
    }

    .form-group label {
      display: block;
      font-size: 15px;
      color: #000000;
      margin-bottom: 25px;
      font-weight: normal;
    }

    .form-group input {
      width: 100%;
      border: none;
      border-bottom: 2px solid #008000;
      background: transparent;
      outline: none;
      font-size: 16px;
      padding: 5px 2px 8px 2px;
      color: #333;
    }

    .form-group input::placeholder {
      color: #888;
      font-size: 16px;
    }

    .form-group input:focus {
      border-bottom-color: #006400;
    }

    .btn-wrapper {
      display: flex;
      justify-content: center;
      margin-top: 40px;
    }

    .btn-login {
      background-color: #1e90ff;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      padding: 12px 40px;
      font-size: 18px;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-login:hover {
      background-color: #1873cc;
    }

    .btn-login:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <div class=\"login-container\" id=\"loginBox\">
    <button class=\"close-btn\" onclick=\"closeForm()\" title=\"Tutup\">X</button>

    <h1 class=\"title\">Login</h1>

    <form id=\"loginForm\" onsubmit=\"return handleLogin(event)\">
      <div class=\"form-group\">
        <label for=\"email\">Email:</label>
        <input
          type=\"email\"
          id=\"email\"
          name=\"email\"
          placeholder=\"Masukan Email\"
          required
        />
      </div>

      <div class=\"form-group\">
        <label for=\"password\">Password:</label>
        <input
          type=\"password\"
          id=\"password\"
          name=\"password\"
          placeholder=\"Masukan Password\"
          required
        />
      </div>

      <div class=\"btn-wrapper\">
        <button type=\"submit\" class=\"btn-login\">Login</button>
      </div>
    </form>
  </div>

  <script>
    function handleLogin(event) {
      event.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
        alert('Email dan Password wajib diisi!');
        return false;
      }

      alert('Login berhasil!
Email: ' + email);
      return false;
    }

    function closeForm() {
      document.getElementById('loginBox').style.display = 'none';
    }
  </script>

</body>
</html>
"
