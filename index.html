"<!DOCTYPE html>
<html lang=\"id\">
<head>
  <meta charset=\"UTF-8\" />
  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />
  <title>Form Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background-color: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .form-container {
      background-color: #ffffff;
      width: 100%;
      max-width: 400px;
      padding: 35px 30px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .form-container h2 {
      text-align: center;
      color: #333;
      margin-bottom: 25px;
      font-size: 26px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: #555;
      font-size: 14px;
      font-weight: bold;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: #1e90ff;
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .form-options label {
      color: #555;
      cursor: pointer;
    }

    .form-options a {
      color: #1e90ff;
      text-decoration: none;
    }

    .form-options a:hover {
      text-decoration: underline;
    }

    .btn-login {
      width: 100%;
      background-color: #1e90ff;
      color: white;
      border: none;
      padding: 11px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn-login:hover {
      background-color: #1873cc;
    }

    .register-link {
      text-align: center;
      margin-top: 18px;
      font-size: 13px;
      color: #555;
    }

    .register-link a {
      color: #1e90ff;
      text-decoration: none;
      font-weight: bold;
    }

    .register-link a:hover {
      text-decoration: underline;
    }

    .error-msg {
      background-color: #ffe6e6;
      color: #c0392b;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 15px;
      display: none;
    }
  </style>
</head>
<body>

  <div class=\"form-container\">
    <h2>Form Login</h2>

    <div class=\"error-msg\" id=\"errorMsg\"></div>

    <form id=\"loginForm\" onsubmit=\"return prosesLogin(event)\">
      <div class=\"form-group\">
        <label for=\"username\">Username</label>
        <input
          type=\"text\"
          id=\"username\"
          name=\"username\"
          placeholder=\"Masukkan username\"
          required
        />
      </div>

      <div class=\"form-group\">
        <label for=\"password\">Password</label>
        <input
          type=\"password\"
          id=\"password\"
          name=\"password\"
          placeholder=\"Masukkan password\"
          required
        />
      </div>

     
      <button type=\"submit\" class=\"btn-login\">Login</button>

      
    </form>
  </div>

  <script>
    function prosesLogin(event) {
      event.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');

      // Validasi input kosong
      if (username === '' || password === '') {
        tampilkanError('Username dan password tidak boleh kosong!');
        return false;
      }

      // Validasi panjang password
      if (password.length < 6) {
        tampilkanError('Password minimal 6 karakter!');
        return false;
      }

      // Cek username & password (contoh hardcode)
      if (username === 'admin' && password === 'admin123') {
        errorMsg.style.display = 'none';
        alert('Login berhasil! Selamat datang, ' + username);
         window.location.href = "kasir.html"; pindah ke halaman lain
      } else {
        tampilkanError('Username atau password salah!');
      }

      return false;
    }

    function tampilkanError(pesan) {
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.textContent = pesan;
      errorMsg.style.display = 'block';
    }
  </script>

</body>
</html>
"
